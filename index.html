
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Veenweide Kaart</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

    <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Check of de bibliotheken geladen zijn om ReferenceErrors te voorkomen
        if (typeof pmtiles !== 'undefined' && typeof maplibregl !== 'undefined') {

            // Registreer protocol
            const protocol = new pmtiles.Protocol();
            maplibregl.addProtocol("pmtiles", protocol.add);

            const map = new maplibregl.Map({
                container: 'map',
                style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
                center: [5.1, 52.1],
                zoom: 8
            });

            map.on('load', () => {
                map.addSource('veenweide_source', {
                    type: 'vector',
                    url: 'pmtiles://veenweide.pmtiles'
                });

                map.addLayer({
                    'id': 'veenweide_laag_fill',
                    'type': 'fill',
                    'source': 'veenweide_source',
                    'source-layer': 'veenweide_laag',
                    'paint': {
                        'fill-color': '#8d6e63',
                        'fill-opacity': 0.6,
                        'fill-outline-color': '#ffffff'
                    }
                });
            });

            map.on('error', (e) => {
                console.error("MapLibre fout:", e);
            });

        } else {
            console.error("Bibliotheken niet geladen. pmtiles:", typeof pmtiles, "maplibregl:", typeof maplibregl);
            document.body.innerHTML = "<h1>Fout bij laden van bibliotheken. Check console.</h1>";
        }
    </script>
</body>
</html>
