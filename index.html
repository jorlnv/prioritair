<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PMTiles kaart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- MapLibre GL CSS -->
    <link href="https://unpkg.com/maplibre-gl@2.6.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
    </style>
</head>
<body>
<div id="map"></div>

<!-- MapLibre GL JS -->
<script src="https://unpkg.com/maplibre-gl@2.6.1/dist/maplibre-gl.js"></script>

<!-- PMTiles JS -->
<script src="https://unpkg.com/@protomaps/pmtiles@0.12.0/dist/pmtiles.min.js"></script>

<script>
async function initMap() {
    // 1. Maak MapLibre map
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {},
            layers: []
        },
        center: [5.1, 52.1],  // pas aan naar jouw regio
        zoom: 12
    });

    // 2. PMTiles source
    const pmtilesUrl = 'tiles/veenweide.pmtiles';  // pad op GitHub Pages
    const pmtilesSource = new PMTiles(pmtilesUrl);
    await pmtilesSource.open();

    // 3. Voeg de PMTiles-laag toe als vector source
    map.addSource('veenweide', {
        type: 'vector',
        tiles: [
            `pmtiles://${pmtilesUrl}`  // dit wordt afgehandeld door pmtiles.js
        ],
        minzoom: 0,
        maxzoom: 14
    });

    // 4. Voeg de layer toe
    map.addLayer({
        id: 'veenweide_laag',
        type: 'fill',          // type afhankelijk van je data (fill, line, circle, etc.)
        source: 'veenweide',
        'source-layer': 'veenweide_laag',  // zoals je in Tippecanoe hebt ingesteld
        paint: {
            'fill-color': '#88cc88',
            'fill-opacity': 0.5
        }
    });
}

initMap();
</script>
</body>
</html>
