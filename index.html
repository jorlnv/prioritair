
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Veenweide Kaart</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/index.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // 2. Activeer het PMTiles protocol direct
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol("pmtiles", protocol.add);

        // 3. Initialiseer de kaart met een standaard Carto stijl
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
            center: [5.1, 52.1],
            zoom: 8
        });

        map.on('load', () => {
            // 4. Voeg de PMTiles bron toe
            map.addSource('veenweide_source', {
                type: 'vector',
                url: 'pmtiles://' + 'veenweide.pmtiles'
            });

            // 5. Teken de laag
            map.addLayer({
                'id': 'veenweide_laag_id',
                'type': 'fill',
                'source': 'veenweide_source',
                'source-layer': 'veenweide_laag',
                'paint': {
                    'fill-color': '#8d6e63',
                    'fill-opacity': 0.6,
                    'fill-outline-color': '#ffffff'
                }
            });
        });

        // Foutopsporing voor de console
        map.on('error', (e) => {
            console.error('MapLibre Error:', e);
        });
    </script>
</body>
</html>
