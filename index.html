
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Veenweide Debug</title>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/index.js"></script>
    <style>
        body { margin: 0; }
        #map { position: absolute; width: 100%; height: 100%; }
        #status { position: absolute; top: 10; left: 10; z-index: 999; background: white; padding: 10px; border: 1px solid black; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="status">Status: Initialiseren...</div>
    <div id="map"></div>
    <script>
        const statusDiv = document.getElementById('status');

        // 1. Protocol registreren
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol("pmtiles", protocol.add);

        // 2. Directe check: Kan de browser het bestand überhaupt 'lezen'?
        fetch('veenweide.pmtiles', { method: 'HEAD' })
            .then(res => {
                statusDiv.innerHTML = "Bestand gevonden! Type: " + res.headers.get('content-type');
            })
            .catch(err => {
                statusDiv.innerHTML = "FOUT: Kan 'veenweide.pmtiles' niet vinden op GitHub.";
            });

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
            center: [5.1, 52.1],
            zoom: 8
        });

        map.on('load', () => {
            map.addSource('veenweide_src', {
                type: 'vector',
                url: 'pmtiles://' + 'veenweide.pmtiles'
            });

            map.addLayer({
                'id': 'vlakken',
                'type': 'fill',
                'source': 'veenweide_src',
                'source-layer': 'veenweide_laag',
                'paint': { 'fill-color': '#8d6e63', 'fill-opacity': 0.6 }
            });
        });

        map.on('error', (e) => {
            console.error(e);
            statusDiv.innerHTML = "Kaartfout: " + e.error.message;
        });
    </script>
</body>
</html>
