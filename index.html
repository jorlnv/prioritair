<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Prioritaire Kaart met Layer Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.1/dist/maplibre-gl.css" />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
  #layerControl {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10; /* Verhoogd voor zekerheid */
      background: white;
      padding: 10px;
      border-radius: 4px;
      font-family: sans-serif;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }
  #layerControl label { display: block; cursor: pointer; margin-bottom: 5px; }
</style>
</head>
<body>

<div id="layerControl">
    <strong>Lagen</strong>
    <label><input type="checkbox" id="toggleVeenweide" checked> Veenweide</label>
    <label><input type="checkbox" id="toggleN2000" checked> N2000</label>
    <label><input type="checkbox" id="toggleBufferstrook" checked> Bufferstrook N2000</label>
    <label><input type="checkbox" id="toggleWaterschap"> Waterschapsgrenzen</label>
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pmtiles@4.4.0/dist/pmtiles.min.js"></script>

<script>
// Protocol setup moet buiten de async functie
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile);

async function initMap() {
    const map = new maplibregl.Map({
        container: 'map',
        style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
        center: [5.1, 52.1],
        zoom: 9 // Iets uitgezoomd voor beter overzicht
    });

    map.on('load', async () => {
        const basePath = `${window.location.protocol}//${window.location.host}${window.location.pathname}`;

        // Helper functie om lagen makkelijker toe te voegen
        async function addPmtilesLayer(id, fileName, sourceLayer, type, paint, visible = 'visible') {
            const url = basePath + fileName;
            const p = new pmtiles.PMTiles(url);
            protocol.add(p);
            
            map.addSource(id, {
                type: 'vector',
                url: `pmtiles://${url}`
            });

            map.addLayer({
                id: id + '_layer',
                type: type,
                source: id,
                'source-layer': sourceLayer,
                layout: { 'visibility': visible },
                paint: paint
            });
        }

        // Lagen toevoegen in volgorde (onderste eerst)
        
        // 1. Veenweide
        await addPmtilesLayer('veenweide', 'veenweide.pmtiles', 'veenweide_laag', 'fill', {
            'fill-color': '#9932CC',
            'fill-opacity': 0.4
        });

        // 2. N2000
        await addPmtilesLayer('n2000', 'N2000.pmtiles', 'N2000', 'fill', {
            'fill-color': '#228B22',
            'fill-opacity': 0.4
        });

        // 3. Bufferstrook
        await addPmtilesLayer('bufferstrook', 'Bufferstrook.pmtiles', 'Bufferstrook', 'fill', {
            'fill-color': '#115211',
            'fill-opacity': 0.6
        });

        // 4. Waterschap (Lijnen bovenop)
        await addPmtilesLayer('waterschap', 'Waterschap.pmtiles', 'Waterschap', 'line', {
            'line-color': '#333',
            'line-width': 1.5
        }, 'none'); // Standaard uit volgens je HTML

        // --- Toggle Logic ---
        const setupToggle = (elementId, layerId) => {
            document.getElementById(elementId).addEventListener('change', (e) => {
                map.setLayoutProperty(layerId, 'visibility', e.target.checked ? 'visible' : 'none');
            });
        };

        setupToggle('toggleVeenweide', 'veenweide_layer');
        setupToggle('toggleN2000', 'n2000_layer');
        setupToggle('toggleBufferstrook', 'bufferstrook_layer');
        setupToggle('toggleWaterschap', 'waterschap_layer');
    });
}

initMap();
</script>
</body>
</html>
