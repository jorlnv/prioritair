
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Veenweide Kaart</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/index.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // STAP 2: Registreer het PMTiles protocol VOORDAT de kaart wordt aangemaakt
        // Dit voorkomt de "this.tiles" error
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol("pmtiles", protocol.add);

        // STAP 3: Maak de kaart aan
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
            center: [5.1, 52.1],
            zoom: 8
        });

        map.on('load', () => {
            // STAP 4: Voeg de bron toe met het pmtiles:// protocol
            map.addSource('veenweide_bron', {
                type: 'vector',
                url: 'pmtiles://' + 'veenweide.pmtiles'
            });

            // STAP 5: Voeg de laag toe
            map.addLayer({
                'id': 'veenweide_vlakken',
                'type': 'fill',
                'source': 'veenweide_bron',
                'source-layer': 'veenweide_laag',
                'paint': {
                    'fill-color': '#8d6e63',
                    'fill-opacity': 0.6,
                    'fill-outline-color': '#ffffff'
                }
            });
        });

        // Foutafhandeling die we in de Console kunnen zien
        map.on('error', (e) => {
            console.error('Kaartfout:', e);
        });
    </script>
</body>
</html>
