<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Veenweide Kaart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MapLibre CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.1/dist/maplibre-gl.css" />
<style>
  body { margin: 0; padding: 0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id="map"></div>

<!-- MapLibre JS -->
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.1/dist/maplibre-gl.js"></script>
<!-- PMTiles JS -->
<script src="https://cdn.jsdelivr.net/npm/pmtiles@4.4.0/dist/pmtiles.min.js"></script>

<script>
async function initMap() {
    const map = new maplibregl.Map({
        container: 'map',
        // Basemap: Carto Positron vector style
        style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
        center: [5.1, 52.1],
        zoom: 11
    });

    // Voeg PMTiles protocol toe
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    // Laad je eigen PMTiles bestand
    const url = `${location.protocol}//${location.host}${location.pathname}veenweide.pmtiles`;
    const p = new pmtiles.PMTiles(url);
    protocol.add(p);

    await p.getHeader();

    // Voeg PMTiles source toe
    map.addSource('veenweide', {
        type: 'vector',
        url: `pmtiles://${url}`
    });

    // Voeg layer toe (polygons)
    map.addLayer({
        id: 'veenweide_laag',
        type: 'fill',
        source: 'veenweide',
        'source-layer': 'veenweide_laag',
        paint: { 'fill-color': '#88cc88', 'fill-opacity': 0.5 }
    });
}

initMap();
</script>

</body>
</html>
