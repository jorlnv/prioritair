<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>Debug Mode - Woningbouw</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.1/dist/maplibre-gl.css" />
    <style>
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
        #status {
            position: absolute; top: 10px; right: 10px; z-index: 100;
            background: rgba(0,0,0,0.8); color: white; padding: 10px;
            font-family: monospace; font-size: 12px; max-width: 300px;
        }
    </style>
</head>
<body>

<div id="status">Systeem status: Initialiseren...</div>
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pmtiles@4.4.0/dist/pmtiles.min.js"></script>

<script>
const statusEl = document.getElementById('status');
function log(msg) { statusEl.innerHTML += '<br>> ' + msg; console.log(msg); }

// 1. Protocol registreren
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile);
log("PMTiles protocol geregistreerd");

const map = new maplibregl.Map({
    container: 'map',
    style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
    center: [5.1, 52.1],
    zoom: 7
});

map.on('error', (e) => log("MAP ERROR: " + e.error.message));

map.on('load', async () => {
    log("Basiskaart geladen");

    async function addLayer(id, file, sourceLayer, color) {
        try {
            // Dit is de meest veilige manier voor GitHub Pages subfolders
            const url = new URL(file, window.location.href).href;
            log(`Laden: ${file}...`);
            
            const p = new pmtiles.PMTiles(url);
            protocol.add(p);
            
            map.addSource(id, {
                type: 'vector',
                url: `pmtiles://${url}`
            });

            map.addLayer({
                id: id + '_layer',
                type: 'fill',
                source: id,
                'source-layer': sourceLayer,
                paint: { 'fill-color': color, 'fill-opacity': 0.7 }
            });
            log(`SUCCES: ${id} toegevoegd`);
        } catch (err) {
            log(`FOUT bij ${id}: ` + err.message);
        }
    }

    // We laden eerst alleen de probleemlaag om te testen
    // Zorg dat Regionale_wb.pmtiles in DEZELFDE map staat als dit bestand
    await addLayer('regionale', 'Regionale_wb.pmtiles', 'Regionale_wb', '#B01499');
    await addLayer('woningbouw', 'Woningbouw.pmtiles', 'Woningbouw', '#e78ac3');
});
</script>
</body>
</html>
